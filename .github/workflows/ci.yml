name: CI

on:
  push:
    branches: [main]
    # Only full-semver tags (vN.N.N) trigger the publish pipeline.
    # Floating major/minor tags (v1, v1.0) are pushed manually after a
    # release to retarget consumers' `uses: ...@v1` and MUST NOT
    # re-trigger publish. See `make release-floating-tags`.
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Some pinned actions (e.g. aquasecurity/trivy-action transitively pulls
  # actions/cache@v4.2.4) still ship on Node.js 20. GitHub deprecated Node 20
  # for runner-side JS actions in 2025-09; opt into Node 24 now to silence the
  # deprecation warning. Safe to remove once every transitive dep ships Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Set up mise (hadolint, shellcheck, trivy, act)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Build
        run: make build

  test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: make deps

      - name: Test with coverage
        run: make test-coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: make deps

      - name: Integration test
        run: make integration-test

      - name: Action entrypoint test
        run: make action-test

  e2e:
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: E2E test
        run: make e2e

  docker:
    needs: [static-check, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read CATALYST_REF
        id: catalyst
        run: echo "ref=$(tr -d '[:space:]' < CATALYST_REF)" >> "$GITHUB_OUTPUT"

      # CATALYST_REPO mirrors the Makefile overrides in fetch-catalyst and
      # image-build — pins to AndriyKalashnykov/catalyst (fork) while upstream
      # PRs for https://github.com/localgod/catalyst/issues/554 are pending.
      # Revert along with the Makefile overrides once any upstream PR merges.
      - name: Set CATALYST_REPO
        id: catalyst_repo
        run: echo "repo=https://github.com/AndriyKalashnykov/catalyst.git" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: puml2drawio:scan
          build-args: |
            CATALYST_REPO=${{ steps.catalyst_repo.outputs.repo }}
            CATALYST_REF=${{ steps.catalyst.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'puml2drawio:scan'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Smoke test
        run: |
          set -euo pipefail
          version=$(docker run --rm puml2drawio:scan --version)
          echo "CLI version: ${version}"
          [ -n "${version}" ] || { echo 'empty --version output' >&2; exit 1; }

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CATALYST_REPO=${{ steps.catalyst_repo.outputs.repo }}
            CATALYST_REF=${{ steps.catalyst.outputs.ref }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      - name: Verify multi-arch manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag=$(echo "${TAGS}" | head -n1)
          [ -n "${first_tag}" ] || { echo 'no tags to verify' >&2; exit 1; }
          echo "Inspecting ${first_tag}..."
          docker buildx imagetools inspect "${first_tag}"

  ci-pass:
    if: always()
    needs: [static-check, build, test, integration-test, e2e, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
